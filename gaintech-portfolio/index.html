<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gain Tech — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080808;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --text: #f0f0f0;
    --muted: #888;
    --muted2: #555;
    --accent: #ffffff;
    --tag-bg: rgba(255,255,255,0.06);
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  html { background: var(--bg); }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 100px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    padding: 48px 20px 24px;
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 20px; right: 20px;
    height: 1px;
    background: var(--border);
  }
  .brand {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .header-title {
    font-family: var(--font-display);
    font-size: clamp(28px, 8vw, 38px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.03em;
    color: var(--accent);
  }
  .header-title span {
    color: var(--muted2);
  }
  .header-sub {
    margin-top: 10px;
    font-size: 14px;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.5;
  }

  /* ── Filters ── */
  .filters-wrap {
    padding: 20px 20px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    padding-bottom: 16px;
  }
  .filters-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: var(--border);
  }
  .filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    padding: 7px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 500;
  }

  /* ── Stats bar ── */
  .stats {
    display: flex;
    gap: 0;
    padding: 0 20px;
    margin-top: 20px;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-left: 20px;
    margin-right: 20px;
  }
  .stat {
    flex: 1;
    padding: 14px 12px;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }
  .stat-num {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 300;
  }

  /* ── Grid ── */
  .grid {
    padding: 24px 20px 0;
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    animation: fadeUp 0.4s both;
  }
  .card:active { transform: scale(0.98); }
  .card:hover { border-color: var(--border-hover); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-preview {
    width: 100%;
    height: 180px;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .card-preview-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .preview-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .preview-icon svg { width: 20px; height: 20px; stroke: var(--muted2); fill: none; }
  .preview-label { font-size: 12px; color: var(--muted2); font-weight: 300; }
  .card-preview-number {
    position: absolute;
    top: 12px; right: 12px;
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--muted2);
  }

  .card-body { padding: 16px; }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .card-tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--tag-bg);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 100px;
  }
  .card-tag.site { color: #c8c8c8; }
  .card-tag.bot  { color: #a8a8a8; }
  .card-tag.other { color: #909090; }
  .card-year {
    font-size: 11px;
    color: var(--muted2);
    margin-left: auto;
    font-weight: 300;
  }
  .card-title {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--accent);
    margin-bottom: 6px;
    line-height: 1.25;
  }
  .card-desc {
    font-size: 13px;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.55;
    margin-bottom: 14px;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    padding-top: 14px;
    gap: 10px;
  }
  .card-tech {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tech-pill {
    font-size: 10px;
    color: var(--muted2);
    background: transparent;
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 100px;
  }
  .card-link {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    text-decoration: none;
    padding: 6px 14px;
    border: 1px solid var(--border-hover);
    border-radius: 100px;
    transition: background 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .card-link:hover { background: rgba(255,255,255,0.08); }
  .card-link svg { width: 12px; height: 12px; stroke: currentColor; fill: none; }

  /* ── Featured card (first item) ── */
  .card.featured .card-preview { height: 220px; }
  .card.featured .card-title { font-size: 20px; }
  .featured-badge {
    position: absolute;
    top: 12px; left: 12px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #000;
    background: var(--accent);
    padding: 4px 10px;
    border-radius: 100px;
  }

  /* ── Empty state ── */
  .empty {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted2);
  }
  .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
  .empty p { font-size: 14px; font-weight: 300; }

  /* ── CTA ── */
  .cta {
    margin: 32px 20px 0;
    padding: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    text-align: center;
  }
  .cta-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }
  .cta-sub {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
    margin-bottom: 16px;
  }
  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 100px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .cta-btn:active { opacity: 0.85; }
  .cta-btn svg { width: 14px; height: 14px; stroke: #000; fill: none; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<div class="header">
  <div class="brand">Gain Tech</div>
  <div class="header-title">Our<br><span>Work.</span></div>
  <div class="header-sub">Сайты, боты и AI-решения<br>для роста вашего бизнеса</div>
</div>

<div class="filters-wrap">
  <div class="filters">
    <button class="filter-btn active" data-filter="all">Все работы</button>
    <button class="filter-btn" data-filter="site">Сайты</button>
    <button class="filter-btn" data-filter="bot">Боты</button>
    <button class="filter-btn" data-filter="other">Другое</button>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-num" id="count-all">6</div><div class="stat-label">Проектов</div></div>
  <div class="stat"><div class="stat-num" id="count-site">2</div><div class="stat-label">Сайтов</div></div>
  <div class="stat"><div class="stat-num" id="count-bot">3</div><div class="stat-label">Ботов</div></div>
  <div class="stat"><div class="stat-num" id="count-other">1</div><div class="stat-label">AI</div></div>
</div>

<div class="grid" id="grid"></div>

<div class="cta">
  <div class="cta-title">Хотите так же?</div>
  <div class="cta-sub">Обсудим вашу задачу и предложим решение</div>
  <button class="cta-btn" onclick="openOrder()">
    <svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
    Оформить заказ
  </button>
</div>

<script>
const ITEMS = [
  {
    id: 1,
    type: "bot",
    featured: true,
    title: "Gain Tech Bot",
    desc: "AI-ассистент для автоматизации продаж и консультаций в Telegram. LLM + воронка лидов + уведомления.",
    tech: ["aiogram 3", "Python", "OpenRouter"],
    year: "2025",
    url: "https://t.me/gaintech_bot",
    preview: null
  },
  {
    id: 2,
    type: "site",
    title: "Лендинг для клиники",
    desc: "Одностраничный сайт с формой записи, галереей и SEO-оптимизацией. Конверсия +34%.",
    tech: ["Next.js", "Tailwind", "Vercel"],
    year: "2025",
    url: "#",
    preview: null
  },
  {
    id: 3,
    type: "bot",
    title: "CRM-бот для сети кафе",
    desc: "Приём заказов, учёт столиков, уведомления поварам. Заменил 2 администратора.",
    tech: ["aiogram", "PostgreSQL", "Redis"],
    year: "2025",
    url: "#",
    preview: null
  },
  {
    id: 4,
    type: "site",
    title: "Корпоративный портал",
    desc: "Внутренняя система учёта заявок и задач для строительной компании.",
    tech: ["React", "FastAPI", "Docker"],
    year: "2024",
    url: "#",
    preview: null
  },
  {
    id: 5,
    type: "bot",
    title: "Бот для онлайн-школы",
    desc: "Рассылки, домашние задания, оплата прямо в Telegram. 1 200+ студентов.",
    tech: ["aiogram", "Stripe", "SQLite"],
    year: "2024",
    url: "#",
    preview: null
  },
  {
    id: 6,
    type: "other",
    title: "AI-помощник для HR",
    desc: "Автоматическая обработка резюме, скоринг кандидатов и сводки для менеджера.",
    tech: ["GPT-4", "Python", "Telegram"],
    year: "2025",
    url: "#",
    preview: null
  }
];

const typeLabel = { site: "Сайт", bot: "Бот", other: "AI / Другое" };

function iconForType(type) {
  if (type === "site") return `<svg viewBox="0 0 24 24" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;
  if (type === "bot") return `<svg viewBox="0 0 24 24" stroke-width="1.5"><rect x="3" y="8" width="18" height="12" rx="3"/><path d="M12 8V4M8 4h8M9 13h.01M15 13h.01"/></svg>`;
  return `<svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>`;
}

function renderCard(item, index) {
  const div = document.createElement('div');
  div.className = 'card' + (item.featured ? ' featured' : '');
  div.dataset.type = item.type;
  div.style.animationDelay = (index * 60) + 'ms';

  const preview = item.preview
    ? `<img src="${item.preview}" alt="${item.title}" loading="lazy">`
    : `<div class="card-preview-placeholder">
        <div class="preview-icon">${iconForType(item.type)}</div>
        <div class="preview-label">${typeLabel[item.type]}</div>
       </div>`;

  div.innerHTML = `
    <div class="card-preview">
      ${preview}
      <div class="card-preview-number">${String(item.id).padStart(2,'0')}</div>
      ${item.featured ? '<div class="featured-badge">Featured</div>' : ''}
    </div>
    <div class="card-body">
      <div class="card-meta">
        <span class="card-tag ${item.type}">${typeLabel[item.type]}</span>
        <span class="card-year">${item.year}</span>
      </div>
      <div class="card-title">${item.title}</div>
      <div class="card-desc">${item.desc}</div>
      <div class="card-footer">
        <div class="card-tech">
          ${item.tech.map(t => `<span class="tech-pill">${t}</span>`).join('')}
        </div>
        ${item.url && item.url !== '#' ? `
        <a class="card-link" href="${item.url}" target="_blank">
          Открыть
          <svg viewBox="0 0 24 24" stroke-width="2"><path d="M7 17L17 7M7 7h10v10"/></svg>
        </a>` : ''}
      </div>
    </div>`;
  return div;
}

let currentFilter = 'all';

function render(filter) {
  currentFilter = filter;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const filtered = filter === 'all' ? ITEMS : ITEMS.filter(i => i.type === filter);
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">○</div><p>Скоро появятся работы в этой категории</p></div>`;
    return;
  }
  filtered.forEach((item, i) => grid.appendChild(renderCard(item, i)));
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.filter);
  });
});

function openOrder() {
  if (window.Telegram?.WebApp) {
    Telegram.WebApp.sendData(JSON.stringify({ action: 'order' }));
  } else {
    window.open('https://t.me/gaintech_bot', '_blank');
  }
}

// Init Telegram WebApp
if (window.Telegram?.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  Telegram.WebApp.setHeaderColor('#080808');
  Telegram.WebApp.setBackgroundColor('#080808');
}

render('all');
</script>
</body>
</html>
